<!-- @dsCard group="Colors" viewport="700x150" name="Semantic roles" subtitle="How the raw scales map to surfaces, text and borders." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .tile { border-radius: var(--radius-lg); border: 1px solid var(--border-default); overflow: hidden; background: var(--surface-card); }
  .chip { height: 46px; }
  .meta { padding: 8px 10px; }
  .meta b { display: block; font-size: 12px; color: var(--text-strong); }
  .meta span { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile"><div class="chip" style="background:var(--accent)"></div><div class="meta"><b>--accent</b><span>brand-600</span></div></div>
    <div class="tile"><div class="chip" style="background:var(--surface-inverse)"></div><div class="meta"><b>--surface-inverse</b><span>brand-900</span></div></div>
    <div class="tile"><div class="chip" style="background:var(--highlight)"></div><div class="meta"><b>--highlight</b><span>coral-500</span></div></div>
    <div class="tile"><div class="chip" style="background:var(--surface-muted)"></div><div class="meta"><b>--surface-muted</b><span>sand-100</span></div></div>
    <div class="tile"><div class="chip" style="background:var(--surface-card);border-bottom:1px solid var(--border-default)"></div><div class="meta"><b>--surface-card</b><span>#ffffff</span></div></div>
    <div class="tile"><div class="chip" style="background:var(--border-default)"></div><div class="meta"><b>--border-default</b><span>sand-200</span></div></div>
    <div class="tile"><div class="chip" style="background:var(--text-body)"></div><div class="meta"><b>--text-body</b><span>sand-800</span></div></div>
    <div class="tile"><div class="chip" style="background:var(--text-muted)"></div><div class="meta"><b>--text-muted</b><span>sand-600</span></div></div>
  </div>
</body>
</html>
