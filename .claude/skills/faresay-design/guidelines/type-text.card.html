<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; align-items: baseline; gap: 14px; padding: 7px 0; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); width: 92px; flex-shrink: 0; }
  .eyebrow { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--highlight); }
</style>
</head>
<body>
  <div class="row"><span class="spec">eyebrow</span><span class="eyebrow">For therapists</span></div>
  <div class="row"><span class="spec">20 / 400</span><span style="font-size:20px;color:var(--text-body)">Simple enough to run from your phone.</span></div>
  <div class="row"><span class="spec">16 / 400</span><span style="font-size:16px;color:var(--text-body);line-height:1.7">Connect with registered therapists — you pay a fair price, your therapist keeps the great majority of it.</span></div>
  <div class="row"><span class="spec">14 / 500</span><span style="font-size:14px;font-weight:500;color:var(--text-muted)">No subscription · Cancel free 24h before</span></div>
  <div class="row"><span class="spec">12 / 400</span><span style="font-size:12px;color:var(--text-subtle)">Verified therapists only · per session</span></div>
</body>
</html>
