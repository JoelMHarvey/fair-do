<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); font-family: var(--font-sans); }
  .quote { font-family: var(--font-display); font-size: 19px; font-weight: 500; color: var(--text-heading); line-height: 1.35; max-width: 620px; margin-bottom: 16px; }
  .quote span { color: var(--accent); }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; padding: 7px 14px; border-radius: var(--radius-pill); background: var(--surface-card); border: 1px solid var(--border-default); color: var(--text-muted); }
  .eyebrow { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--highlight); margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="eyebrow">Made by people with heart</div>
  <p class="quote">Therapists deserve better tools — and fairer terms. <span>No lock-in, no games</span>, and no company profiting from human suffering.</p>
  <div class="chips">
    <span class="chip">🤝 Your clients stay yours</span>
    <span class="chip">🪶 Genuinely simple</span>
    <span class="chip">🔒 Private by design</span>
    <span class="chip">💷 Set your own prices</span>
  </div>
</body>
</html>
