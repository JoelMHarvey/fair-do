<!-- @dsCard group="Colors" viewport="700x190" name="Sand — warm neutrals" subtitle="Replaces cold greys. sand-50 = page, sand-200 = borders, sand-800 = body text." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border-default); }
  .sw { flex: 1; height: 96px; display: flex; align-items: flex-end; padding: 8px; }
  .sw span { font-family: var(--font-mono); font-size: 10px; }
  .labels { display: flex; gap: 0; margin-top: 8px; }
  .labels div { flex: 1; font-family: var(--font-sans); font-size: 11px; color: var(--text-muted); text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--color-sand-50)"><span>50</span></div>
    <div class="sw" style="background:var(--color-sand-100)"></div>
    <div class="sw" style="background:var(--color-sand-200)"><span>200</span></div>
    <div class="sw" style="background:var(--color-sand-300)"></div>
    <div class="sw" style="background:var(--color-sand-400)"></div>
    <div class="sw" style="background:var(--color-sand-500);color:#fff"><span>500</span></div>
    <div class="sw" style="background:var(--color-sand-600);color:#fff"></div>
    <div class="sw" style="background:var(--color-sand-700);color:#fff"></div>
    <div class="sw" style="background:var(--color-sand-800);color:#fff"><span>800</span></div>
    <div class="sw" style="background:var(--color-sand-900);color:#fff"><span>900</span></div>
  </div>
  <div class="labels">
    <div>50</div><div>100</div><div>200</div><div>300</div><div>400</div><div>500</div><div>600</div><div>700</div><div>800</div><div>900</div>
  </div>
</body>
</html>
