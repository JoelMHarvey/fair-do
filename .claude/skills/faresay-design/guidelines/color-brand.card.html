<!-- @dsCard group="Colors" viewport="700x190" name="Brand — evergreen teal" subtitle="Calming primary scale. brand-600 is the primary action colour." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 96px; display: flex; align-items: flex-end; padding: 8px; }
  .sw span { font-family: var(--font-mono); font-size: 10px; }
  .labels { display: flex; gap: 0; margin-top: 8px; }
  .labels div { flex: 1; font-family: var(--font-sans); font-size: 11px; color: var(--text-muted); text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--color-brand-50)"></div>
    <div class="sw" style="background:var(--color-brand-100)"></div>
    <div class="sw" style="background:var(--color-brand-200)"></div>
    <div class="sw" style="background:var(--color-brand-300)"></div>
    <div class="sw" style="background:var(--color-brand-400)"></div>
    <div class="sw" style="background:var(--color-brand-500);color:#fff"><span>500</span></div>
    <div class="sw" style="background:var(--color-brand-600);color:#fff"><span>600 ·#217567</span></div>
    <div class="sw" style="background:var(--color-brand-700);color:#fff"><span>700</span></div>
    <div class="sw" style="background:var(--color-brand-800);color:#fff"><span>800</span></div>
    <div class="sw" style="background:var(--color-brand-900);color:#fff"><span>900</span></div>
  </div>
  <div class="labels">
    <div>50</div><div>100</div><div>200</div><div>300</div><div>400</div><div>500</div><div>600</div><div>700</div><div>800</div><div>900</div>
  </div>
</body>
</html>
