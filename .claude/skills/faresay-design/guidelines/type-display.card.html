<!-- @dsCard group="Type" viewport="700x230" name="Display — Fraunces" subtitle="Warm serif for headings & hero numbers. Semibold (600), tight tracking." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--surface-card); }
  .row { display: flex; align-items: baseline; gap: 14px; border-bottom: 1px solid var(--border-default); padding: 10px 0; }
  .row:last-child { border-bottom: 0; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); width: 92px; flex-shrink: 0; }
  .d { font-family: var(--font-display); color: var(--text-heading); font-weight: 600; letter-spacing: -0.02em; line-height: 1.05; }
</style>
</head>
<body>
  <div class="row"><span class="spec">60 / 600</span><span class="d" style="font-size:48px">Therapy that's fair</span></div>
  <div class="row"><span class="spec">36 / 600</span><span class="d" style="font-size:34px">Your whole practice</span></div>
  <div class="row"><span class="spec">24 / 600</span><span class="d" style="font-size:24px">In one calm place</span></div>
  <div class="row"><span class="spec">48 / 600 · num</span><span class="d" style="font-size:40px;color:var(--accent)">up to 100%</span></div>
</body>
</html>
