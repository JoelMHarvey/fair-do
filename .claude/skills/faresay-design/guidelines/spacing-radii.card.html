<!-- @dsCard group="Spacing" viewport="700x170" name="Radii & shadows" subtitle="Pills for actions, rounded-3xl (24px) cards, quiet warm-tinted shadows." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-sans); display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); text-align: center; margin-top: 8px; }
  .box { width: 92px; height: 70px; background: var(--surface-card); border: 1px solid var(--border-default); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 12px; }
  .item { text-align: center; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)">12px</div><div class="spec">--radius-md</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)">16px</div><div class="spec">--radius-lg</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)">24px</div><div class="spec">--radius-xl · card</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill)">pill</div><div class="spec">--radius-pill</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl);border:0;box-shadow:var(--shadow-md)">md</div><div class="spec">--shadow-md</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill);border:0;background:var(--accent);color:#fff;box-shadow:var(--shadow-cta)">cta</div><div class="spec">--shadow-cta</div></div>
</body>
</html>
