<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base. Generous, calm rhythm — sections breathe at 80–112px." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
  .bar { background: var(--color-brand-200); height: 16px; border-radius: 3px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 130px; }
</style>
</head>
<body>
  <div class="row"><span class="lbl">--space-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="lbl">--space-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="lbl">--space-6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="lbl">--space-10 · 40</span><div class="bar" style="width:40px"></div></div>
  <div class="row"><span class="lbl">--space-16 · 64</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="lbl">--space-28 · 112</span><div class="bar" style="width:112px"></div></div>
</body>
</html>
