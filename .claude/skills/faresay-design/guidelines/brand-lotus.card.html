<!-- @dsCard group="Brand" viewport="700x240" name="Breathing lotus" subtitle="Signature hero motif — a 4-7-8 breathing lotus that slowly opens & closes." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); display: flex; align-items: center; justify-content: center; }
  .fl-lotus-wrap { width: 200px; aspect-ratio: 1/1; filter: drop-shadow(0 14px 30px rgba(33,117,103,0.20)); }
  .fl-lotus { width: 100%; height: 100%; display: block; overflow: visible; }
  .fl-petal { transform-box: fill-box; transform-origin: 50% 100%; animation-duration: 12s; animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
  .fl-o-n58 { animation-name: fl-o-n58; } .fl-o-p58 { animation-name: fl-o-p58; }
  .fl-o-n34 { animation-name: fl-o-n34; } .fl-o-p34 { animation-name: fl-o-p34; }
  .fl-m-n20 { animation-name: fl-m-n20; } .fl-m-p20 { animation-name: fl-m-p20; }
  .fl-i-n8 { animation-name: fl-i-n8; } .fl-i-p8 { animation-name: fl-i-p8; } .fl-i-z { animation-name: fl-i-z; }
  .fl-halo { transform-box: fill-box; transform-origin: center; animation: fl-halo 12s ease-in-out infinite; }
  @keyframes fl-o-n58 { 0%{transform:rotate(-58deg) scaleY(1) scaleX(1)} 20%,55%{transform:rotate(0) scaleY(.66) scaleX(.9)} 95%,100%{transform:rotate(-58deg) scaleY(1) scaleX(1)} }
  @keyframes fl-o-p58 { 0%{transform:rotate(58deg) scaleY(1) scaleX(1)} 20%,55%{transform:rotate(0) scaleY(.66) scaleX(.9)} 95%,100%{transform:rotate(58deg) scaleY(1) scaleX(1)} }
  @keyframes fl-o-n34 { 0%{transform:rotate(-34deg) scaleY(1) scaleX(1)} 20%,55%{transform:rotate(0) scaleY(.66) scaleX(.9)} 95%,100%{transform:rotate(-34deg) scaleY(1) scaleX(1)} }
  @keyframes fl-o-p34 { 0%{transform:rotate(34deg) scaleY(1) scaleX(1)} 20%,55%{transform:rotate(0) scaleY(.66) scaleX(.9)} 95%,100%{transform:rotate(34deg) scaleY(1) scaleX(1)} }
  @keyframes fl-m-n20 { 0%{transform:rotate(-20deg) scaleY(1) scaleX(1)} 20%,55%{transform:rotate(0) scaleY(.72) scaleX(.9)} 95%,100%{transform:rotate(-20deg) scaleY(1) scaleX(1)} }
  @keyframes fl-m-p20 { 0%{transform:rotate(20deg) scaleY(1) scaleX(1)} 20%,55%{transform:rotate(0) scaleY(.72) scaleX(.9)} 95%,100%{transform:rotate(20deg) scaleY(1) scaleX(1)} }
  @keyframes fl-i-n8 { 0%{transform:rotate(-8deg) scaleY(1) scaleX(1)} 20%,55%{transform:rotate(0) scaleY(.82) scaleX(.94)} 95%,100%{transform:rotate(-8deg) scaleY(1) scaleX(1)} }
  @keyframes fl-i-p8 { 0%{transform:rotate(8deg) scaleY(1) scaleX(1)} 20%,55%{transform:rotate(0) scaleY(.82) scaleX(.94)} 95%,100%{transform:rotate(8deg) scaleY(1) scaleX(1)} }
  @keyframes fl-i-z { 0%{transform:scaleY(1) scaleX(1)} 20%,55%{transform:scaleY(.82) scaleX(.94)} 95%,100%{transform:scaleY(1) scaleX(1)} }
  @keyframes fl-halo { 0%{transform:scale(1);opacity:.55} 20%,55%{transform:scale(.8);opacity:.3} 95%,100%{transform:scale(1);opacity:.55} }
  @media (prefers-reduced-motion: reduce) { .fl-petal, .fl-halo { animation: none !important; } }
</style>
</head>
<body>
  <div class="fl-lotus-wrap" role="img" aria-label="Breathing lotus">
    <svg class="fl-lotus" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="flHalo" cx="50%" cy="55%" r="55%">
          <stop offset="0%" stop-color="#7fc4b8" stop-opacity="0.9"></stop>
          <stop offset="100%" stop-color="#7fc4b8" stop-opacity="0"></stop>
        </radialGradient>
        <linearGradient id="flPetal" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2f9183"></stop>
          <stop offset="100%" stop-color="#217567"></stop>
        </linearGradient>
        <linearGradient id="flPetalLight" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#57b3a4"></stop>
          <stop offset="100%" stop-color="#2f9183"></stop>
        </linearGradient>
      </defs>
      <circle class="fl-halo" cx="100" cy="118" r="78" fill="url(#flHalo)"></circle>
      <g fill="url(#flPetal)">
        <path class="fl-petal fl-o-n58" d="M100 150 C76 132 70 86 100 40 C130 86 124 132 100 150 Z"></path>
        <path class="fl-petal fl-o-p58" d="M100 150 C76 132 70 86 100 40 C130 86 124 132 100 150 Z"></path>
        <path class="fl-petal fl-o-n34" d="M100 150 C76 132 70 86 100 40 C130 86 124 132 100 150 Z"></path>
        <path class="fl-petal fl-o-p34" d="M100 150 C76 132 70 86 100 40 C130 86 124 132 100 150 Z"></path>
      </g>
      <g fill="url(#flPetalLight)">
        <path class="fl-petal fl-m-n20" d="M100 150 C80 134 76 96 100 56 C124 96 120 134 100 150 Z"></path>
        <path class="fl-petal fl-m-p20" d="M100 150 C80 134 76 96 100 56 C124 96 120 134 100 150 Z"></path>
      </g>
      <g fill="#bfe6df">
        <path class="fl-petal fl-i-n8" d="M100 150 C86 138 84 108 100 74 C116 108 114 138 100 150 Z"></path>
        <path class="fl-petal fl-i-p8" d="M100 150 C86 138 84 108 100 74 C116 108 114 138 100 150 Z"></path>
        <path class="fl-petal fl-i-z" d="M100 150 C88 138 88 112 100 82 C112 112 112 138 100 150 Z"></path>
      </g>
    </svg>
  </div>
</body>
</html>
