name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit + Integration + Native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Root dependencies (Next.js app + test tooling)
      - name: Install root dependencies
        run: npm ci

      # Native dependencies (separate package.json / node_modules)
      - name: Install native dependencies
        run: npm ci --prefix native

      # Generate Prisma client so route handlers can import @prisma/client types.
      # Integration tests mock @/lib/prisma at the boundary, so no real DB is needed.
      - name: Generate Prisma client
        run: npx prisma generate

      # P0 unit tests + P1 integration tests (all Prisma/Stripe/Clerk mocked at boundary).
      # The test suite does NOT need DATABASE_URL — all DB calls are mocked via vi.mock.
      - name: Run tests
        run: npm test

      # P3 native DTO + api.ts tests
      - name: Run native tests
        run: npm run test:native

      # Coverage — runs after tests so a test failure still surfaces in the PR check.
      # Generates lcov report + text summary; fails the job if thresholds are ever added
      # to vitest.config.ts coverage.thresholds.
      - name: Generate coverage report
        run: npm run test:coverage
        if: always()

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Prisma types must be generated before tsc can resolve @prisma/client.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck Next.js app
        run: npx tsc --noEmit

      - name: Install native dependencies
        run: npm ci --prefix native

      - name: Typecheck native app
        run: npm run typecheck --prefix native

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # eslint-config-next resolves some rules against generated types.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # Catches build breaks (MDX/route-collection/Turbopack) before they reach a
      # Vercel deploy. No secrets needed — pages that hit auth/DB fall back at build.
      - name: Build
        run: npm run build

  db-tests:
    name: Real-DB integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fairdo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fairdo_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/fairdo_test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # Runs the REAL Prisma client against the disposable Postgres above.
      # global-setup pushes the schema; tests exercise constraints + the erasure
      # transaction that the mock-based suite can't verify.
      - name: Run real-DB tests
        run: npm run test:db
