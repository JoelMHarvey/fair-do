name: E2E

# Runs nightly against staging, and on demand before a deployment.
# All credentials come from the "staging" GitHub environment; tests skip
# gracefully when env vars are absent (see playwright.config.ts + spec guards).
on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every night
  workflow_dispatch:
    inputs:
      base_url:
        description: Override staging URL (defaults to repo secret E2E_BASE_URL)
        required: false

concurrency:
  group: e2e
  cancel-in-progress: false   # Don't kill a running E2E suite mid-flight

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Only install Chromium — the config uses Desktop Chrome only.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed E2E test accounts
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL not set — skipping E2E seed (data must already exist)"
            exit 0
          fi
          node prisma/seed-e2e.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_TEACHER_EMAIL: ${{ secrets.E2E_TEACHER_EMAIL }}
          E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
          E2E_TEACHER_FIRST_NAME: ${{ secrets.E2E_TEACHER_FIRST_NAME }}
          E2E_TEACHER_LAST_NAME: ${{ secrets.E2E_TEACHER_LAST_NAME }}

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: ${{ inputs.base_url || secrets.E2E_BASE_URL }}
          # Clerk test accounts (seeded in the staging environment)
          E2E_TEACHER_EMAIL: ${{ secrets.E2E_TEACHER_EMAIL }}
          E2E_TEACHER_PASSWORD: ${{ secrets.E2E_TEACHER_PASSWORD }}
          E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
          E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD }}
          # Seeded data IDs for deterministic assertions
          E2E_TEACHER_SLUG: ${{ secrets.E2E_TEACHER_SLUG }}
          E2E_TEACHER_FIRST_NAME: ${{ secrets.E2E_TEACHER_FIRST_NAME }}
          E2E_TEACHER_LAST_NAME: ${{ secrets.E2E_TEACHER_LAST_NAME }}
          E2E_TEST_SESSION_ID: ${{ secrets.E2E_TEST_SESSION_ID }}
          E2E_TEST_GUEST_TOKEN: ${{ secrets.E2E_TEST_GUEST_TOKEN }}
          E2E_TEST_MATCH_ID: ${{ secrets.E2E_TEST_MATCH_ID }}
          # Clerk backend key for token-based auth (bypasses new-device OTP)
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      # Always upload the HTML report so failures can be investigated.
      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      # Upload test traces (captured on retry — see playwright.config.ts trace: 'on-first-retry').
      - name: Upload Playwright traces
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
